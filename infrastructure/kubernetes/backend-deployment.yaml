apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medical-backend
  template:
    metadata:
      labels:
        app: medical-backend
    spec:
      containers:
        - name: backend
          image: medical-knowledge-assistant:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: medical-config
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: medical-backend
spec:
  selector:
    app: medical-backend
  ports:
    - port: 80
      targetPort: 8000
