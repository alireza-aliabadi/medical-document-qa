services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: medical
      POSTGRES_PASSWORD: medical
      POSTGRES_DB: medical_kb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medical -d medical_kb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://medical:medical@postgres:5432/medical_kb
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_URL: http://qdrant:6333
      S3_ENDPOINT: http://minio:9000
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    command: celery -A backend.workers.celery_app worker --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://medical:medical@postgres:5432/medical_kb
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_URL: http://qdrant:6333
      S3_ENDPOINT: http://minio:9000
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.frontend
    environment:
      VITE_API_PROXY: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  mlflow_data:
  grafana_data:
